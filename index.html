<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Hello, World!</title>
    <link rel="stylesheet" href="styles/style.css">
  </head>
  <body>
      <header>
          <div>
              <p>Home page</p>
          </div>
          <hr>
          <div class="flex_container_1">
              <div class="page_logo_image_1">
                  <img src="images/Pickle-logo-thing.png" 
                  alt="A grey cat sits within a white laundry hamper, looking up at the camera">
              </div>
              <div class="page_logo_name_1">
                  <h1>Pickle thing website</h1>
              </div>
          </div>
      </header>
      <section>
          <div>
              <div class="flex_container_2">
                  <a href="https://www.roblox.com">
                      <div class="page_nav_button">
                          <p class="util_highlight_text">Home</p>
                      </div>
                  </a>
                  <a href="https://www.roblox.com">
                      <div class="page_nav_button util_page_selected_color">
                          <p>Contact us</p>
                      </div>
                  </a>
             </div>
          </div>
      </section>
      <section>
            <form action="input-userid" class="flex_container_input">
                <div class="flex_label_row">
                    <div class="input_label">
                        <label for="name">Name:</label>
                    </div>
                    <div class="input_label">
                        <label for="email">Email:</label>
                    </div>
                    <div class="input_label">
                        <label for="message">Message:</label>
                    </div>
                </div>
                <div class="flex_input_row">
                    <div class="input_box">
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="input_box">
                        <input type="text" id="email" name="email" required>
                    </div>
                    <div class="input_box util_extend_message_label">
                        <input type="text" id="message" name="message" required>
                    </div>
                    <div class="submit_button">
                        <button type="submit">Submit</button>
                    </div>
                </div>
            </form>
      </section>
      <footer>
          <p>Created by XYZ<br>
          Follow us on [social media]
          </p>
      </footer>
  </body>
</html>
